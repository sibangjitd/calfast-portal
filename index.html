<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Channel Command Center · CalFast on Amazon.ca</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>

<style>
:root{
  --paper:#FFFFFF; --wash:#FAFAF7; --ink:#14160F; --sub:#6B6E63; --line:#E7E8E1;
  --lime:#DBF4A7; --limeDeep:#557A1B; --limeMid:#8FB23A; --warn:#B45309; --alert:#B91C1C;
  --panel:#16180F; --panelSub:#9CA08C;
  --fd:'Bricolage Grotesque', system-ui, sans-serif;
  --fb:'IBM Plex Sans', system-ui, sans-serif;
  --fm:'IBM Plex Mono', ui-monospace, monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--wash);color:var(--ink);font-family:var(--fb);}
button{font-family:inherit;}
input,textarea,select{font-family:var(--fb);}
input:focus,textarea:focus,select:focus{outline:2px solid var(--limeMid);outline-offset:1px;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px;}
.shell{display:flex;max-width:1180px;margin:0 auto;min-height:100vh;}
.side{width:232px;flex-shrink:0;border-right:1px solid var(--line);background:var(--paper);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
.main{flex:1;overflow-y:auto;max-height:100vh;}
.navbtn{display:flex;align-items:center;gap:10px;width:100%;text-align:left;font-size:13.5px;cursor:pointer;padding:9px 12px;border-radius:9px;margin-bottom:2px;border:none;background:transparent;color:var(--sub);}
.navbtn.active{background:#EEF6DC;color:var(--limeDeep);font-weight:600;}
.card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:18px;}
.grid{display:grid;gap:12px;}
.g2{grid-template-columns:repeat(2,1fr);} .g3{grid-template-columns:repeat(3,1fr);}
.g4{grid-template-columns:repeat(4,1fr);} .g5{grid-template-columns:repeat(5,1fr);}
.btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--fm);font-size:13px;font-weight:600;color:var(--ink);background:var(--lime);border:1px solid var(--limeMid);border-radius:10px;padding:10px 16px;cursor:pointer;}
.btn.sm{padding:7px 12px;font-size:12px;}
.btn.ghost{color:#E7EAD9;background:transparent;border:1px solid rgba(255,255,255,0.28);}
.btn.line{background:#fff;border:1px solid var(--line);color:var(--sub);font-weight:500;}
.btn.danger{background:#FBE9E9;border:1px solid #F2D2D2;color:var(--alert);}
.pill{font-family:var(--fm);font-size:11px;border-radius:999px;padding:3px 9px;white-space:nowrap;}
.eyebrow{font-family:var(--fm);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--limeDeep);}
.h2{font-family:var(--fd);font-weight:600;font-size:26px;line-height:1.1;margin:6px 0 0;}
.sub{font-family:var(--fb);font-size:14px;color:var(--sub);margin:8px 0 0;max-width:640px;}
.jdtag{font-family:var(--fm);font-size:10.5px;color:var(--limeDeep);background:#EEF6DC;border:1px solid var(--lime);border-radius:999px;padding:3px 9px;white-space:nowrap;}
table{width:100%;border-collapse:collapse;}
th{font-family:var(--fm);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--sub);text-align:left;padding:11px 13px;font-weight:500;}
td{padding:11px 13px;vertical-align:middle;}
.lbl{display:block;font-family:var(--fm);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--sub);margin:10px 0 5px;}
.inp{width:100%;font-size:13px;color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:9px 11px;background:#fff;}
.modalbg{position:fixed;inset:0;background:rgba(20,22,15,.45);display:flex;align-items:flex-start;justify-content:center;padding:32px 16px;z-index:50;overflow-y:auto;}
.modal{background:#fff;border-radius:16px;max-width:520px;width:100%;padding:22px;}
.spin{animation:spin 1s linear infinite;} @keyframes spin{to{transform:rotate(360deg);}}
.rise{animation:rise .7s cubic-bezier(.2,.7,.2,1) both;} @keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
.fade{animation:fade .4s ease both;} @keyframes fade{from{opacity:0;}to{opacity:1;}}
.tabs{display:none;}
@media(max-width:760px){
  .side{display:none;} .tabs{display:flex;}
  .g2,.g3,.g4,.g5{grid-template-columns:1fr 1fr;}
}
@media(prefers-reduced-motion:reduce){.rise,.fade,.spin{animation:none!important;}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useMemo,useRef} = React;

/* ---------------------------------------------------------- TOKENS */
const C={paper:"#FFFFFF",wash:"#FAFAF7",ink:"#14160F",sub:"#6B6E63",line:"#E7E8E1",
  lime:"#DBF4A7",limeDeep:"#557A1B",limeMid:"#8FB23A",warn:"#B45309",alert:"#B91C1C",

const FM="var(--fm)",FB="var(--fb)",FD="var(--fd)";

/* ---------------------------------------------------------- STORAGE (safe) */
const store={
  read(k,f){try{const v=window.localStorage.getItem(k);return v?JSON.parse(v):f;}catch(e){return f;}},
  write(k,v){try{window.localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
};

/* ---------------------------------------------------------- SEED DATA */
const SEED=[
 {id:1,sku:"TFG-SCR-1030",name:'#10 x 3" Structural Wood Screw, 500 ct',brand:"TFG Private",cat:"Fasteners",ch:"FBA",cost:31.00,price:42.99,units:38,sold30:190,leadTime:14,map:39.99,comp:41.50,owner:"You",suppressed:false},
 {id:2,sku:"TFG-HEX-1206",name:'1/2" x 6" Hex Bolt, Grade 5, 25 ct',brand:"TFG Private",cat:"Fasteners",ch:"FBA",cost:19.50,price:28.49,units:540,sold30:230,leadTime:14,map:25.99,comp:28.00,owner:"You",suppressed:false},
 {id:3,sku:"TFG-ANC-0350",name:'3/8" Sleeve Anchor, Zinc, 50 ct',brand:"TFG Private",cat:"Fasteners",ch:"FBA",cost:24.00,price:33.99,units:1480,sold30:185,leadTime:21,map:29.99,comp:33.00,owner:"You",suppressed:false},
 {id:4,sku:"TFG-CUT-0450",name:'4.5" Cut-Off Wheel, Metal, 25 ct',brand:"TFG Private",cat:"Abrasives",ch:"FBA",cost:16.50,price:21.99,units:620,sold30:58,leadTime:21,map:18.99,comp:20.50,owner:"You",suppressed:false},
 {id:5,sku:"TFG-GLV-NITL",name:"Nitrile-Coated Work Gloves, L, 12 pr",brand:"TFG Private",cat:"Safety",ch:"FBA",cost:18.00,price:26.99,units:410,sold30:0,leadTime:14,map:23.99,comp:25.50,owner:"Suppressed",suppressed:true},
 {id:6,sku:"DW-IMP-887K",name:"DeWALT 20V MAX Impact Driver Kit",brand:"DeWALT",cat:"Power Tools",ch:"FBM",cost:188.00,price:184.99,units:64,sold30:70,leadTime:30,map:209.00,comp:184.99,owner:"3P Seller",suppressed:false},
 {id:7,sku:"MW-HMR-2904",name:"Milwaukee M18 FUEL Hammer Drill",brand:"Milwaukee",cat:"Power Tools",ch:"FBM",cost:232.00,price:279.00,units:31,sold30:42,leadTime:30,map:269.00,comp:278.00,owner:"You",suppressed:false},
 {id:8,sku:"MK-SND-5021",name:'Makita 5" Random Orbit Sander',brand:"Makita",cat:"Power Tools",ch:"FBM",cost:96.00,price:119.00,units:210,sold30:34,leadTime:30,map:109.00,comp:118.00,owner:"You",suppressed:false},
 {id:9,sku:"BO-BIT-21TI",name:"Bosch 21-pc Titanium Drill Bit Set",brand:"Bosch",cat:"Power Tools",ch:"FBA",cost:38.00,price:49.99,units:320,sold30:150,leadTime:21,map:44.99,comp:49.00,owner:"You",suppressed:false},
 {id:10,sku:"TFG-GLS-AF12",name:"Anti-Fog Safety Glasses, Clear, 12 ct",brand:"TFG Private",cat:"Safety",ch:"FBA",cost:27.50,price:34.99,units:290,sold30:0,leadTime:14,map:31.99,comp:27.50,owner:"Suppressed",suppressed:true},
];
const CATS=["Fasteners","Power Tools","Hand Tools","Abrasives","Safety","Adhesives","Chemicals","Electrical"];

/* ---------------------------------------------------------- HELPERS */
const money=n=>"$"+Math.round(n).toLocaleString("en-CA");
const money2=n=>"$"+(Number(n)||0).toLocaleString("en-CA",{minimumFractionDigits:2,maximumFractionDigits:2});
const reduceMotion=()=>window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches;

function metrics(s){
  const vel=(Number(s.sold30)||0)/30;
  const cover=vel>0?(Number(s.units)||0)/vel:Infinity;
  const marginAbs=(Number(s.price)||0)-(Number(s.cost)||0);
  const marginPct=Number(s.price)>0?marginAbs/Number(s.price):0;
  const belowCost=Number(s.cost)>0&&Number(s.price)<Number(s.cost);
  const lead=Number(s.leadTime)||14;
  const rop=vel*lead+vel*7;
  const needsReorder=vel>0&&(Number(s.units)||0)<=rop;
  const target=45;
  const suggestQty=Math.max(0,Math.round(vel*(lead+target)-(Number(s.units)||0)));
  const f30=Math.round(vel*30),f60=Math.round(vel*60),f90=Math.round(vel*90);
  const belowMap=Number(s.map)>0&&Number(s.comp)>0&&Number(s.comp)<Number(s.map);
  let status="healthy";
  if(s.suppressed)status="stranded";
  else if(belowCost)status="loss";
  else if(vel<=0&&(Number(s.units)||0)>0)status="dead";
  else if(needsReorder)status="reorder";
  else if(cover>120)status="overstock";
  return{vel,cover,marginAbs,marginPct,belowCost,belowMap,rop,needsReorder,suggestQty,f30,f60,f90,status,lead};
}
const SM={
  healthy:{label:"Healthy",color:C.limeDeep,bg:"#EEF6DC"},
  reorder:{label:"Reorder now",color:C.warn,bg:"#FBF1E3"},
  overstock:{label:"Overstock",color:C.warn,bg:"#FBF1E3"},
  dead:{label:"No sales",color:C.warn,bg:"#FBF1E3"},
  loss:{label:"Below cost",color:C.alert,bg:"#FBE9E9"},
  stranded:{label:"Stranded",color:C.alert,bg:"#FBE9E9"},
};

/* ---------------------------------------------------------- ICONS */
const P={
  sparkles:"M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8z",
  gauge:"M12 13l4-4 M21 13a9 9 0 10-18 0",
  box:"M3 8l9-5 9 5v8l-9 5-9-5z M3 8l9 5 9-5 M12 13v8",
  tag:"M4 4h7l9 9-7 7-9-9z",
  mega:"M4 9v6h4l8 4V5L8 9z",
  msg:"M4 5h16v10H9l-5 4z",
  cal:"M5 6h14v14H5z M5 10h14 M9 4v4 M15 4v4",
  alert:"M12 3l9 16H3z M12 9v5 M12 17v.5",
  up:"M3 17l6-6 4 4 8-8 M17 7h4v4",
  down:"M3 7l6 6 4-4 8 8 M17 17h4v-4",
  check:"M5 12l4 4 10-10",
  plus:"M12 5v14 M5 12h14",
  x:"M6 6l12 12 M18 6L6 18",
  edit:"M14 4l6 6-10 10H4v-6z",
  trash:"M4 7h16 M9 7V5h6v2 M6 7l1 13h10l1-13",
  search:"M11 11m-7 0a7 7 0 1014 0a7 7 0 10-14 0 M21 21l-4.3-4.3",
  shield:"M12 3l8 3v6c0 5-4 8-8 9-4-1-8-4-8-9V6z",
  ext:"M14 4h6v6 M20 4l-9 9 M5 7v12h12V12",
  rotate:"M4 10a8 8 0 0114-4l2 2 M20 14a8 8 0 01-14 4l-2-2 M18 4v4h-4 M6 20v-4h4",
  list:"M8 6h12 M8 12h12 M8 18h12 M4 6h.01 M4 12h.01 M4 18h.01",
  bolt:"M13 3L4 14h6l-1 7 9-11h-6z",
  dl:"M12 4v10 M8 11l4 4 4-4 M5 19h14",
};
function Ic({n,s=16,c="currentColor",sw=1.8,fill="none"}){
  return <svg width={s} height={s} viewBox="0 0 24 24" fill={fill} stroke={c} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" aria-hidden>
    {P[n].split(" M").map((d,i)=><path key={i} d={(i?"M":"")+d}/>)}
  </svg>;
}
function Logo({s=22}){
  return <svg width={s} height={s} viewBox="0 0 24 24" fill="none" aria-hidden>
    <rect x="2" y="13" width="3.6" height="9" rx="1" fill={C.limeDeep}/>
    <rect x="7.2" y="9" width="3.6" height="13" rx="1" fill={C.limeDeep}/>
    <rect x="12.4" y="5" width="3.6" height="17" rx="1" fill={C.limeMid}/>
    <circle cx="20" cy="5.5" r="2.6" fill={C.lime} stroke={C.limeDeep} strokeWidth="1.2"/>
  </svg>;
}

/* ---------------------------------------------------------- SHARED UI */
function Head({eyebrow,title,sub,jd}){
  return <div style={{marginBottom:22}}>
    <div style={{display:"flex",flexWrap:"wrap",gap:12,alignItems:"flex-end",justifyContent:"space-between"}}>
      <div>
        <div className="eyebrow">{eyebrow}</div>
        <h2 className="h2">{title}</h2>
      </div>
      {jd&&<div style={{display:"flex",flexWrap:"wrap",gap:8}}>{jd.map(j=><span className="jdtag" key={j}>{j}</span>)}</div>}
    </div>
    {sub&&<p className="sub">{sub}</p>}
  </div>;
}
const Dot=({c})=><span style={{display:"inline-block",width:7,height:7,borderRadius:999,background:c}}/>;

function useCount(t,ms=1000){
  const[v,setV]=useState(reduceMotion()?t:0);
  useEffect(()=>{
    if(reduceMotion()){setV(t);return;}
    let raf,start;const tick=x=>{if(!start)start=x;const p=Math.min((x-start)/ms,1);
      setV(t*(1-Math.pow(1-p,3)));if(p<1)raf=requestAnimationFrame(tick);};
    raf=requestAnimationFrame(tick);return()=>cancelAnimationFrame(raf);
  },[t]);return v;
}
function Kpi({label,value,suffix="",dec=0,trend,good}){
  const v=useCount(value);
  const disp=dec?v.toFixed(dec):Math.round(v).toLocaleString("en-CA");
  return <div className="card">
    <div style={{fontFamily:FM,fontSize:11,letterSpacing:".08em",color:C.sub,textTransform:"uppercase"}}>{label}</div>
    <div style={{fontFamily:FM,fontWeight:600,fontSize:26,marginTop:8}}>{disp}{suffix}</div>
    {trend&&<div style={{display:"flex",alignItems:"center",gap:5,marginTop:6,fontFamily:FM,fontSize:12,color:good?C.limeDeep:C.warn}}>
      <Ic n={good?"up":"down"} s={13} c={good?C.limeDeep:C.warn}/>{trend}</div>}
  </div>;
}

/* simple SVG area sparkline */
function Spark({data,h=180}){
  const ref=useRef(null);const[w,setW]=useState(560);
  useEffect(()=>{const f=()=>ref.current&&setW(ref.current.clientWidth);f();window.addEventListener("resize",f);return()=>window.removeEventListener("resize",f);},[]);
  const max=Math.max(...data),min=Math.min(...data);
  const pts=data.map((d,i)=>[i/(data.length-1)*w,h-8-((d-min)/(max-min||1))*(h-26)]);
  const line=pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
  const area=line+` L${w} ${h} L0 ${h} Z`;
  return <div ref={ref} style={{width:"100%"}}>
    <svg width={w} height={h}>
      <defs><linearGradient id="ga" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor={C.limeMid} stopOpacity="0.35"/><stop offset="100%" stopColor={C.limeMid} stopOpacity="0.02"/></linearGradient></defs>
      <path d={area} fill="url(#ga)"/><path d={line} fill="none" stroke={C.limeMid} strokeWidth="2.4"/>
    </svg>
  </div>;
}

/* ---------------------------------------------------------- ALERTS (live) */
function buildAlerts(items){
  const a=[];
  items.forEach(s=>{const m=metrics(s);
    if(m.belowCost)a.push({sev:"alert",icon:"alert",sku:s.sku,title:s.name+" is listed below cost",
      body:`List ${money2(s.price)} against cost ${money2(s.cost)}. Losing ${money2(-m.marginAbs)} per unit. Raise price or pull the listing.`,to:"pricing"});
    if(s.suppressed)a.push({sev:"alert",icon:"shield",sku:s.sku,title:s.name+" is stranded",
      body:`Not buyable until reinstated. ${s.units} units idle, about ${money(s.units*s.cost*0.45)} in tied capital.`,to:"catalogue"});
    if(m.needsReorder&&!s.suppressed)a.push({sev:"warn",icon:"box",sku:s.sku,title:s.name+" needs a purchase order",
      body:`Sells ${m.vel.toFixed(1)}/day, stocks out in ${Math.round(m.cover)} days. Order ${m.suggestQty} units now to cover the ${m.lead}-day lead time.`,to:"catalogue"});
    if(m.belowMap)a.push({sev:"warn",icon:"tag",sku:s.sku,title:s.name+" has a MAP breach",
      body:`A seller is ${money2(s.map-s.comp)} under your ${money2(s.map)} floor. Enforce through Brand Registry.`,to:"pricing"});
  });
  const order={alert:0,warn:1};
  return a.sort((x,y)=>order[x.sev]-order[y.sev]);
}
function AlertRow({a,go}){
  const c=a.sev==="alert"?C.alert:C.warn;
  return <button onClick={()=>go(a.to)} className="card" style={{textAlign:"left",cursor:"pointer",display:"block",width:"100%"}}>
    <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
      <span style={{background:a.sev==="alert"?"#FBE9E9":"#FBF1E3",borderRadius:9,padding:8,flexShrink:0}}><Ic n={a.icon} s={16} c={c}/></span>
      <div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <span style={{fontFamily:FB,fontWeight:600,fontSize:14}}>{a.title}</span>
          <span style={{fontFamily:FM,fontSize:10.5,color:C.sub}}>{a.sku}</span>
        </div>
        <div style={{fontFamily:FB,fontSize:12.5,color:C.sub,marginTop:4,lineHeight:1.45}}>{a.body}</div>
      </div>
    </div>
  </button>;
}

/* ---------------------------------------------------------- PITCH */
function Pitch({go}){
  const proof=[["204%","throughput scaled at my own D2C e-commerce brand, Ctouch"],
   ["$25M+","pan-India liquidation P&L I ran across Flipkart fulfillment"],
   ["82\u219295%","receiving accuracy lifted in 90 days through process control"],
   ["13 yrs","supply chain and operations, inbound to fulfillment to recovery"]];
  return <div>
    <div className="rise" style={{background:C.panel,borderRadius:20,padding:"44px 36px",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",inset:0,background:"radial-gradient(900px 300px at 88% -10%, rgba(219,244,167,0.16), transparent)"}}/>
      <div style={{position:"relative"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:22}}>
          <Logo s={20}/><span style={{fontFamily:FM,fontSize:12,letterSpacing:".1em",color:C.panelSub,textTransform:"uppercase"}}>Channel Intelligence \u00b7 built for CalFast</span>
        </div>
        <h1 style={{fontFamily:FD,fontWeight:700,fontSize:40,lineHeight:1.04,color:"#fff",margin:0,maxWidth:760}}>
          I did not send a resume.<br/><span style={{color:C.lime}}>I built your Amazon channel.</span></h1>
        <p style={{fontFamily:FB,fontSize:16,color:"#D7DAC9",margin:"18px 0 0",maxWidth:600,lineHeight:1.55}}>
          A working operations portal for CalFast on Amazon.ca. Manage the catalogue, set prices with a live below-cost guard, and let the forecast tell you what to reorder before you stock out. Add and edit SKUs yourself, every number updates.</p>
        <div style={{display:"flex",flexWrap:"wrap",gap:12,marginTop:26}}>
          <button className="btn" onClick={()=>go("command")}>Open the command center <Ic n="up" s={15} c={C.ink}/></button>
          <button className="btn ghost" onClick={()=>go("catalogue")}><Ic n="box" s={15} c="#E7EAD9"/> Manage the catalogue</button>
        </div>
      </div>
    </div>
    <div style={{display:"flex",gap:10,alignItems:"flex-start",background:C.wash,border:"1px solid "+C.line,borderRadius:12,padding:"12px 16px",marginTop:14}}>
      <Ic n="alert" s={16} c={C.warn}/><p style={{fontFamily:FB,fontSize:12.5,color:C.sub,margin:0,lineHeight:1.5}}>
        Demonstration build. Figures are illustrative and use plausible CalFast / TFG and authorized-brand SKUs, not live Seller Central data. Built to connect to your real account through Amazon SP-API.</p>
    </div>
    <div style={{marginTop:30}}>
      <div className="eyebrow">Why this candidate</div>
      <h3 style={{fontFamily:FD,fontWeight:600,fontSize:22,margin:"6px 0 18px"}}>An operator who has sold online and recovered stranded value at scale</h3>
      <div className="grid g4">{proof.map(p=><div className="card" key={p[0]}>
        <div style={{fontFamily:FM,fontWeight:600,fontSize:28,color:C.limeDeep}}>{p[0]}</div>
        <div style={{fontFamily:FB,fontSize:13,color:C.sub,marginTop:6,lineHeight:1.45}}>{p[1]}</div></div>)}</div>
    </div>
  </div>;

/* ---------------------------------------------------------- COMMAND */
function Command({items,go}){
  const ms=items.map(metrics);
  const net30=items.reduce((a,s)=>a+(Number(s.sold30)||0)*(Number(s.price)||0),0);
  const cogs30=items.reduce((a,s)=>a+(Number(s.sold30)||0)*(Number(s.cost)||0),0);
  const marginPct=net30>0?(net30-cogs30)/net30*100:0;
  const invCost=items.reduce((a,s)=>a+(Number(s.units)||0)*(Number(s.cost)||0),0);
  const atRisk=items.reduce((a,s,i)=>["overstock","dead","stranded"].includes(ms[i].status)?a+(Number(s.units)||0)*(Number(s.cost)||0)*0.4:a,0);
  const belowCost=ms.filter(m=>m.status==="loss").length;
  const reorder=ms.filter(m=>m.status==="reorder").length;

function parseCSV(text){
  const rows=[];let i=0,f="",row=[],q=false;
  while(i<text.length){const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){f+='"';i++;} else q=false; } else f+=c; }
    else { if(c==='"')q=true;
      else if(c===','){row.push(f);f="";}
      else if(c==='\n'||c==='\r'){ if(c==='\r'&&text[i+1]==='\n')i++; row.push(f);f="";rows.push(row);row=[]; }
      else f+=c; }
    i++; }
  if(f!==""||row.length){row.push(f);rows.push(row);}
  return rows.filter(r=>!(r.length===1&&r[0].trim()===""));
}
const CSV_ALIAS={sku:["sku"],name:["name","product","title"],brand:["brand"],cat:["category","cat"],ch:["channel","ch"],
 cost:["cost","cost price","unit cost","purchase price"],price:["price","list price","sale price"],
 units:["units","on hand","onhand","stock","quantity","qty"],sold30:["sold30","sold","units sold","units sold 30d","velocity"],
 leadTime:["leadtime","lead time","lead"],map:["map","map floor"],comp:["comp","competitor","lowest comp"],
 owner:["owner","buy box"],suppressed:["suppressed","stranded"]};
const CSV_NUM=["cost","price","units","sold30","leadTime","map","comp"];
function csvToItems(text){
  const rows=parseCSV(text); if(rows.length<2)return{items:[],skipped:0,error:"No data rows found below the header."};
  const hdr=rows[0].map(h=>h.trim().toLowerCase());
  const idx={};Object.keys(CSV_ALIAS).forEach(k=>{const j=hdr.findIndex(h=>CSV_ALIAS[k].includes(h));if(j>=0)idx[k]=j;});
  if(idx.sku===undefined||idx.name===undefined)return{items:[],skipped:0,error:'CSV needs at least a "sku" and a "name" column.'};
  const out=[];let skipped=0;
  for(let r=1;r<rows.length;r++){const row=rows[r];
    const get=k=>idx[k]!==undefined?(row[idx[k]]||"").trim():"";
    const sku=get("sku"),name=get("name");
    if(!sku||!name){skipped++;continue;}
    const sup=/^(true|yes|y|1)$/i.test(get("suppressed"));
    const it={sku,name,brand:get("brand")||"TFG Private",cat:get("cat")||"Fasteners",ch:(get("ch")||"FBA").toUpperCase(),suppressed:sup,owner:get("owner")||(sup?"Suppressed":"You")};
    CSV_NUM.forEach(k=>{it[k]=Number(get(k))||0;});
    if(!it.leadTime)it.leadTime=14;
    if(!it.comp)it.comp=it.price;
    out.push(it);
  }
  return{items:out,skipped,error:null};
}

  try{const blob=new Blob([headers+"\n"+ex1+"\n"+ex2+"\n"],{type:"text/csv"});

    document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(u);}catch(e){window.alert("Download blocked here. It works on your hosted site.");}
}
function ImportModal({onImport,onClose}){
  const[parsed,setParsed]=useState(null);const[skipped,setSkipped]=useState(0);

      {error&&<div style={{display:"flex",gap:8,alignItems:"flex-start",background:"#FBE9E9",border:"1px solid #F2D2D2",borderRadius:10,padding:"10px 12px",marginTop:12}}>

              border:"1px solid "+(mode===o[0]?C.limeDeep:C.line),background:mode===o[0]?"#EEF6DC":"#fff",color:mode===o[0]?C.limeDeep:C.sub}}>{o[1]}</button>))}

    </div>
  </div>;

/* ---------------------------------------------------------- AI (live-or-canned) */
async function callClaude(prompt){
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
    if(!res.ok)return null;
    const data=await res.json();
    const txt=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
    return parseJSON(txt);
  }catch(e){return null;}
}
function parseJSON(text){
  let c=text.replace(/```json/gi,"").replace(/```/g,"").trim();
  const s=c.indexOf("{"),e=c.lastIndexOf("}");if(s!==-1&&e!==-1)c=c.slice(s,e+1);
  try{return JSON.parse(c);}catch(_){return JSON.parse(c.replace(/[\n\r\t]+/g," "));}
}
function cannedListing(name,cat){
  return {title:`${name} | Heavy-Duty ${cat} for Trade and Jobsite | CalFast / TFG`,
    bullets:[
      `BUILT FOR THE TRADE: ${name} engineered for daily professional use in construction, maintenance, and repair.`,
      "CONSISTENT QUALITY: sourced and stocked by The Fastener Group, the same supply Calgary trades have trusted for years.",
      "RIGHT FIRST TIME: accurate specs and clear sizing so you order once and avoid returns.",
      "FAST CANADIAN FULFILLMENT: shipped from Canadian stock for quick delivery across Amazon.ca.",
      "BULK-READY: case quantities suited to contractors and shops, not just one-off buyers."],
    aplus:["Comparison module: this SKU against thinner or lower-spec alternatives, with a clear specs table.",
      "Brand story module: The Fastener Group heritage and the trades it serves.",
      "Application module: photos of the product in real jobsite use with sizing guidance."],
    keywords:["structural "+cat.toLowerCase(),"contractor grade","jobsite supply","bulk pack","canadian stock","trade fasteners","heavy duty","commercial grade","tfg","calfast"],
    compliance:["Confirm category-required safety attributes are complete to avoid listing suppression.",
      "Enroll in Amazon Brand Registry for TFG private SKUs before running A+ Content.",
      "Verify Canadian bilingual labeling requirements where they apply."]};
}
function cannedVoice(r){
  const t=r.toLowerCase();
  const neg=/(star|fog|late|missing|ripped|broke|loose|not |refund|return|disappoint|cheap)/.test(t);
  const fulfil=/(late|ripped|bag|missing|arrived|shipping|delivery|package)/.test(t);
  const listing=/(photo|listing|described|shows|included|picture|wrong item)/.test(t);
  const cat=fulfil?"Fulfillment / packaging":listing?"Listing accuracy":neg?"Product quality":"Customer expectation";
  return {sentiment:neg?"negative":"positive",stars:neg?2:5,
    rootCause:{category:cat,explanation:fulfil?"The product was fine but it arrived late or damaged in transit, which is a packaging and carrier issue.":listing?"The listing implied something the box did not contain, so the gap is in listing accuracy, not the product.":neg?"The product underperformed against the claim on the listing.":"The customer is satisfied and the listing set the right expectation."},
    response:neg?"Thanks for the detailed feedback. This is not the standard we hold our SKUs to. Please contact us through the order and we will make it right with a replacement or refund, and we are reviewing the listing and packaging so it does not happen again.":"Thanks for the review, we are glad it performed on the job. We appreciate you choosing CalFast and are here if you need anything for the next project.",
    fix:fulfil?"Switch to a rigid mailer for this SKU and add a weight-check at pack-out to stop in-transit damage and shortages.":listing?"Correct the main image and bullet to match exactly what ships, and audit the rest of the listing for the same gap.":neg?"Pull a sample from current stock to verify the spec claim, and update the listing if the claim overstates performance.":"No action needed. Capture what worked here and reuse it across similar listings."};
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
